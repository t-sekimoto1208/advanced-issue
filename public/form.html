<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>問い合わせ登録</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>問い合わせ管理</h1>
    <a href="index.html">← 一覧に戻る</a>
  </header>

  <main>
    <div class="card">
      <h2 style="margin-bottom:16px">新規問い合わせ登録</h2>
      <div id="msg"></div>

      <form id="form">
        <div class="form-group">
          <label for="subject">件名 <span style="color:red">*</span></label>
          <input type="text" id="subject" maxlength="200" placeholder="問い合わせの件名（200文字以内）" required>
        </div>
        <div class="form-group">
          <label for="body">本文 <span style="color:red">*</span></label>
          <textarea id="body" placeholder="問い合わせの詳細内容" required></textarea>
        </div>
        <div class="form-group">
          <label for="assignee">担当者</label>
          <select id="assignee">
            <option value="">未割当</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary">登録する</button>
      </form>
    </div>
  </main>

  <script>
    function showMsg(text, type = 'error') {
      const el = document.getElementById('msg');
      el.innerHTML = `<div class="msg msg-${type}">${text}</div>`;
    }

    async function loadAssignees() {
      try {
        const res = await fetch('/api/assignees');
        if (!res.ok) return;
        const data = await res.json();
        const sel = document.getElementById('assignee');
        data.forEach(a => {
          const opt = document.createElement('option');
          opt.value = a.id;
          opt.textContent = a.name;
          sel.appendChild(opt);
        });
      } catch { /* 無視 */ }
    }

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const subject = document.getElementById('subject').value.trim();
      const body    = document.getElementById('body').value.trim();
      const assigneeId = document.getElementById('assignee').value;

      if (!subject) { showMsg('件名を入力してください'); return; }
      if (!body)    { showMsg('本文を入力してください'); return; }

      const payload = { subject, body };
      if (assigneeId) payload.assignee_id = parseInt(assigneeId, 10);

      try {
        const res = await fetch('/api/inquiries', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok) { showMsg(data.error || '登録に失敗しました'); return; }
        showMsg('登録しました', 'success');
        setTimeout(() => { window.location.href = 'index.html'; }, 800);
      } catch {
        showMsg('サーバーへの接続に失敗しました');
      }
    });

    loadAssignees();
  </script>
</body>
</html>
